name: URReefcam
options:
  bundleIdPrefix: com.ureefcam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO
    SUPPORTS_MACCATALYST: NO

targets:
  URReefcam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: URReefcam
        excludes:
          - "**/*.md"
    info:
      path: URReefcam/Info.plist
      properties:
        CFBundleDisplayName: URReefcam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSCameraUsageDescription: "URReefcam needs camera access to photograph your reef aquarium."
        NSMicrophoneUsageDescription: "URReefcam needs microphone access for video recording."
        NSPhotoLibraryAddUsageDescription: "URReefcam saves photos and videos to your Photos library."
        BGTaskSchedulerPermittedIdentifiers:
          - com.ureefcam.refresh
        UIBackgroundModes:
          - fetch
          - remote-notification
    entitlements:
      path: URReefcam/URReefcam.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ureefcam.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
